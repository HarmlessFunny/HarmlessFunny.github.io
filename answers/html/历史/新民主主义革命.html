<h2>新民主主义革命</h2>
<h4>五四运动</h4>
<ul>
<li>口号：外争主权，内除国贼</li>
<li>意义：促进马克思主义的传播与其同工人运动的结合，为中国共产党的成立做了思想上干部上的准备，是中国新民主主义革命的开端</li>
</ul>
<h4>国共合作</h4>
<ul>
<li>成果：黄埔军校</li>
<li>目的：推翻北洋军阀</li>
<li>结果：北伐胜利，南京国民政府统一全国</li>
</ul>
<h4>国共对立</h4>
<ul>
<li>
<p>南昌起义意义：打响了武装反抗国民党反动统治的第一枪</p>
</li>
<li>
<p>八七会议：枪杆子里出政权</p>
</li>
<li>会师：朱德、毛泽东井冈山会师</li>
<li>遵义会议意义：确立了以毛泽东为核心的党中央的正确领导，挽救了党，挽救了红军，挽救了中国革命，成为中国共产党历史上一个生死攸关的转折点</li>
